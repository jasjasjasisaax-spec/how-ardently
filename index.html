<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>How Ardently</title>
<style>
/* Self-contained font stack — no external dependencies, works offline/Android */
:root {
  --font-body: 'Palatino Linotype', 'Book Antiqua', Palatino, 'Noto Serif', Georgia, 'Times New Roman', serif;
  --font-sc:   'Palatino Linotype', 'Book Antiqua', Palatino, 'Noto Serif', Georgia, serif;
}

/* ── SAVE SLOTS MODAL ── */
#save-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 8000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#save-modal.open { display: flex; }
.save-modal-inner {
  background: var(--ink);
  border: 1px solid var(--gold);
  width: 100%;
  max-width: 380px;
  max-height: 80vh;
  overflow-y: auto;
  border-radius: 4px;
}
.save-modal-hdr {
  padding: 16px 18px 12px;
  border-bottom: 1px solid rgba(180,134,11,.25);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.save-modal-title {
  font-family: 'Palatino Linotype',Georgia,serif;
  font-variant: small-caps;
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--glt);
}
.save-slot {
  padding: 13px 18px;
  border-bottom: 1px solid rgba(196,168,130,.15);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background .15s;
}
.save-slot:active { background: rgba(180,134,11,.1); }
.save-slot-info { flex: 1; }
.save-slot-name {
  font-family: 'Palatino Linotype',Georgia,serif;
  font-variant: small-caps;
  font-size: 14px;
  color: var(--parch);
  display: block;
}
.save-slot-meta {
  font-size: 11px;
  color: var(--sepia);
  margin-top: 2px;
  display: block;
}
.save-slot.empty .save-slot-name { color: var(--sepia); opacity: .5; }
.save-slot-del {
  background: transparent;
  border: 1px solid rgba(139,32,32,.4);
  color: #8b2020;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.save-modal-close {
  background: transparent;
  border: 1px solid var(--sepia);
  color: var(--sepia);
  font-family: 'Palatino Linotype',Georgia,serif;
  font-variant: small-caps;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 6px 14px;
  cursor: pointer;
}

/* ── SETTINGS BUTTON in stat header ── */
.sh-settings-btn {
  background: transparent;
  border: none;
  color: var(--sepia);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
  opacity: .7;
  touch-action: manipulation;
  flex-shrink: 0;
}
.sh-settings-btn:active { opacity: 1; color: var(--gold); }
/* Make sh-top flex so button sits on the right */
.sh-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.sh-top .sh-name { flex: 1; }
</style>
<style>
:root {
  --ink:   #1a0f07;
  --ink2:  #241509;
  --parch: #f5ead6;
  --aged:  #e8d5b0;
  --sepia: #c4a882;
  --brown: #7a4f2d;
  --gold:  #b8860b;
  --glt:   #d4a843;
  --red:   #8b2020;
  --green: #2d5016;
  --card:  #fdf6e8;
  --nav-h: 56px;
  --au-h:  58px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--ink); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif; overflow:hidden; }

/* ── SCREENS ── */
.screen { display:none; position:fixed; inset:0; flex-direction:column; background:var(--parch); }
.screen.active { display:flex; }

/* ── TITLE ── */
#s-title { background:var(--ink); align-items:center; justify-content:center; }
#s-title::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 38%,#3d1f0a 0%,var(--ink) 68%); }
.t-orn  { color:var(--gold); font-size:20px; letter-spacing:10px; z-index:1; opacity:.6; margin-bottom:6px; }
.t-main { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:clamp(44px,12vw,70px); color:var(--glt); letter-spacing:4px; z-index:1; text-align:center; line-height:1; }
.t-sub  { font-style:italic; font-size:clamp(14px,4vw,19px); color:var(--sepia); z-index:1; letter-spacing:2px; margin-top:8px; }
.t-rule { width:150px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); z-index:1; margin:22px 0; }
.t-btns { z-index:1; display:flex; flex-direction:column; gap:12px; align-items:center; }
.btn-title { background:transparent; border:1px solid var(--gold); color:var(--glt); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:16px; letter-spacing:3px; padding:13px 42px; cursor:pointer; transition:all .2s; width:220px; }
.btn-title:active { background:var(--gold); color:var(--ink); }
.btn-title.secondary { border-color:var(--sepia); color:var(--sepia); font-size:14px; padding:11px 42px; }

/* ── CREATE ── */
#s-create { background:var(--parch); }
.cr-hdr { background:var(--ink); padding:15px 18px 13px; text-align:center; flex-shrink:0; }
.cr-hdr h2 { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; color:var(--glt); font-size:19px; letter-spacing:3px; }
.cr-hdr p  { color:var(--sepia); font-style:italic; font-size:12px; margin-top:3px; }
.cr-body { flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:16px; }
.fl { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:11px; letter-spacing:2px; color:var(--brown); margin-bottom:5px; }
.fi { width:100%; background:var(--card); border:1px solid var(--sepia); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif; font-size:19px; color:var(--ink); padding:9px 12px; outline:none; border-radius:0; -webkit-appearance:none; }
.fi:focus { border-color:var(--gold); }
.grow { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.g-btn { background:var(--card); border:1px solid var(--sepia); padding:13px 8px; text-align:center; cursor:pointer; transition:all .2s; }
.g-btn .gi { font-size:24px; display:block; margin-bottom:3px; }
.g-btn .gl { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:12px; letter-spacing:2px; color:var(--brown); }
.g-btn.sel { background:var(--ink); border-color:var(--gold); }
.g-btn.sel .gl { color:var(--glt); }
.rkgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.r-btn { background:var(--card); border:1px solid var(--sepia); padding:10px 8px; cursor:pointer; transition:all .2s; text-align:center; }
.r-btn .rt { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:12px; letter-spacing:1px; color:var(--brown); }
.r-btn .ri { font-size:11px; color:var(--sepia); margin-top:2px; font-style:italic; }
.r-btn.sel { background:var(--ink); border-color:var(--gold); }
.r-btn.sel .rt { color:var(--glt); }
.cr-foot { padding:13px 16px; background:var(--aged); border-top:1px solid var(--sepia); flex-shrink:0; }
.btn-enter { width:100%; background:var(--ink); border:1px solid var(--gold); color:var(--glt); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:16px; letter-spacing:3px; padding:14px; cursor:pointer; transition:all .2s; }
.btn-enter:active { background:var(--gold); color:var(--ink); }
.btn-enter:disabled { opacity:.35; cursor:default; }

/* ── GAME SHELL ── */
#s-game { background:var(--parch); }
.stat-hdr { background:var(--ink); padding:9px 13px 8px; flex-shrink:0; border-bottom:1px solid rgba(180,134,11,.2); z-index:10; }
.sh-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.sh-name { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; color:var(--glt); font-size:18px; letter-spacing:1px; }
.sh-meta { color:var(--sepia); font-style:italic; font-size:11px; }
.bars { display:flex; flex-direction:column; gap:3px; }
.stat-bars { flex-shrink:0; background:var(--ink); border-top:1px solid rgba(180,134,11,.2); padding:6px 13px 7px; }
.sb { display:flex; align-items:center; gap:5px; }
.sb-l { color:var(--sepia); font-size:9px; letter-spacing:1px; font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; width:48px; flex-shrink:0; }
.sb-t { flex:1; height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
.sb-f { height:100%; border-radius:2px; transition:width .5s; }
.sb-n { color:var(--sepia); font-size:9px; width:20px; text-align:right; flex-shrink:0; }
.sh-bot { display:flex; justify-content:space-between; align-items:center; margin-top:5px; padding-top:5px; border-top:1px solid rgba(180,134,11,.12); }
.wv { color:var(--glt); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:13px; }
.tb { font-size:9px; letter-spacing:1px; color:var(--sepia); font-style:italic; }

/* ── SWAPPABLE MIDDLE ── */
.mid { flex:1; overflow:hidden; position:relative; }

/* Home feed */
#view-home { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 11px; display:flex; flex-direction:column; gap:4px; }
#view-home::-webkit-scrollbar { width:2px; }
#view-home::-webkit-scrollbar-thumb { background:var(--sepia); }
#view-home.active { display:flex; }
#view-home:not(.active) { display:none; }

.log-entry { background:var(--card); border-left:3px solid var(--sepia); padding:6px 9px; font-size:13px; color:var(--ink); font-style:italic; line-height:1.4; flex-shrink:0; opacity:0; animation:fu .3s forwards; }
.log-entry.good  { border-left-color:var(--green); }
.log-entry.bad   { border-left-color:var(--red); }
.log-entry.event { border-left-color:var(--gold); }
.yr-banner { background:var(--ink); border:1px solid rgba(180,134,11,.35); padding:6px 10px; text-align:center; flex-shrink:0; }
.yr-banner span { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; color:var(--glt); font-size:12px; letter-spacing:3px; }
@keyframes fu { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

/* Category views */
.cat-view { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; flex-direction:column; }
.cat-view.active { display:flex; }
.cat-view::-webkit-scrollbar { width:2px; }
.cat-view::-webkit-scrollbar-thumb { background:var(--sepia); }
.cat-hdr { background:var(--ink2); padding:12px 14px 10px; flex-shrink:0; border-bottom:1px solid rgba(180,134,11,.25); }
.cat-hdr-title { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; color:var(--glt); font-size:16px; letter-spacing:3px; }
.cat-hdr-sub   { color:var(--sepia); font-style:italic; font-size:11px; margin-top:2px; }
.act-item { display:flex; align-items:center; gap:11px; background:var(--card); border-bottom:1px solid rgba(196,168,130,.25); padding:13px 14px; cursor:pointer; transition:background .15s; -webkit-user-select:none; user-select:none; }
.act-item:active { background:var(--aged); }
.act-item.locked { opacity:.38; pointer-events:none; }
.act-icon { font-size:22px; width:28px; text-align:center; flex-shrink:0; }
.act-body { flex:1; }
.act-name { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:13px; letter-spacing:1px; color:var(--ink); display:block; }
.act-hint { font-size:11px; color:var(--brown); font-style:italic; display:block; margin-top:1px; }
.act-arr  { color:var(--sepia); font-size:15px; flex-shrink:0; }
.act-section { background:var(--aged); padding:5px 14px; font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:9px; letter-spacing:3px; color:var(--brown); border-bottom:1px solid rgba(196,168,130,.3); flex-shrink:0; }

/* ── AGE UP BAR ── */
.au-bar { flex-shrink:0; background:var(--ink); border-top:1px solid rgba(180,134,11,.35); z-index:10; }
.au-btn { width:100%; height:var(--au-h); background:transparent; border:none; color:var(--glt); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:15px; letter-spacing:3px; cursor:pointer; transition:background .18s; display:flex; align-items:center; justify-content:center; gap:10px; }
.au-btn:active { background:var(--gold); color:var(--ink); }
.au-sub { font-size:10px; color:var(--sepia); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif; font-style:italic; letter-spacing:1px; }

/* ── BOTTOM NAV ── */
.bnav { flex-shrink:0; height:var(--nav-h); background:var(--ink2); border-top:1px solid rgba(180,134,11,.25); display:flex; z-index:10; }
.ntab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; border:none; background:transparent; padding:4px 2px; transition:background .15s; -webkit-user-select:none; user-select:none; }
.ntab:active { background:rgba(180,134,11,.1); }
.ntab.active { background:rgba(180,134,11,.07); }
.ntab.active .nl { color:var(--glt); }
.ntab.active .ni { filter:brightness(1.4); }
.ni { font-size:17px; line-height:1; }
.nl { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:9px; letter-spacing:1px; color:var(--sepia); }

/* ── POPUP (bottom sheet) ── */
.pop-ov { position:fixed; inset:0; background:rgba(26,15,7,.78); display:flex; align-items:flex-end; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; }
.pop-ov.open { opacity:1; pointer-events:all; }
.pop-card { background:var(--ink); border:1px solid rgba(180,134,11,.55); border-bottom:none; width:100%; max-width:480px; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); max-height:82dvh; display:flex; flex-direction:column; border-radius:14px 14px 0 0; }
.pop-ov.open .pop-card { transform:translateY(0); }
.pop-pill { width:34px; height:4px; background:rgba(180,134,11,.35); border-radius:2px; margin:9px auto 0; flex-shrink:0; }
.pop-eye  { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:9px; letter-spacing:4px; color:var(--gold); opacity:.6; text-align:center; padding:5px 0 9px; flex-shrink:0; }
.pop-body { flex:1; overflow-y:auto; padding:2px 20px 14px; }
.pop-txt  { font-size:clamp(16px,4.5vw,19px); color:var(--parch); line-height:1.65; font-style:italic; text-align:center; }
.pop-bw   { text-align:center; margin-top:13px; }
.pop-badge { display:inline-block; padding:5px 16px; font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:12px; letter-spacing:2px; border:1px solid; }
.pop-badge.pos { border-color:var(--gold); color:var(--glt); }
.pop-badge.neg { border-color:var(--red); color:#d4504f; }
.pop-badge.neu { border-color:var(--sepia); color:var(--sepia); }
.pop-rule { height:1px; background:linear-gradient(90deg,transparent,rgba(180,134,11,.3),transparent); margin:13px 0 0; }
.pop-choices { padding:0 14px 18px; display:flex; flex-direction:column; gap:7px; flex-shrink:0; }
.ch-btn { background:rgba(255,255,255,.04); border:1px solid rgba(180,134,11,.22); color:var(--parch); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif; font-size:15px; padding:11px 14px; cursor:pointer; text-align:left; transition:all .15s; line-height:1.35; }
.ch-btn:active { background:rgba(180,134,11,.16); border-color:var(--gold); }
.cont-btn { margin:0 14px 18px; background:transparent; border:1px solid var(--gold); color:var(--glt); font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:14px; letter-spacing:3px; padding:13px; cursor:pointer; transition:all .15s; width:calc(100% - 28px); }
.cont-btn:active { background:var(--gold); color:var(--ink); }

/* ── LIFE SUMMARY SCREEN ── */
#s-summary { background:var(--ink); flex-direction:column; }
.sum-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 0 20px; }
.sum-scroll::-webkit-scrollbar { width:2px; }
.sum-scroll::-webkit-scrollbar-thumb { background:rgba(180,134,11,.4); }
.sum-hdr { text-align:center; padding:36px 24px 24px; border-bottom:1px solid rgba(180,134,11,.25); }
.sum-orn { color:var(--gold); font-size:18px; letter-spacing:10px; opacity:.5; margin-bottom:10px; }
.sum-name { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:clamp(28px,8vw,48px); color:var(--glt); letter-spacing:3px; }
.sum-years { color:var(--sepia); font-style:italic; font-size:14px; margin-top:6px; letter-spacing:1px; }
.sum-rule { width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:20px auto 0; }
.sum-section { padding:24px 22px 0; }
.sum-section-label { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:10px; letter-spacing:4px; color:var(--gold); opacity:.6; margin-bottom:12px; }
.sum-body { font-size:clamp(15px,4vw,17px); color:var(--aged); line-height:1.75; font-style:italic; }
.sum-reflection { color:var(--sepia); }
.sum-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; margin-top:4px; }
.sum-stat { font-family:'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps; font-size:12px; color:var(--sepia); letter-spacing:1px; padding:6px 0; border-bottom:1px solid rgba(180,134,11,.15); }
.sum-foot { padding:16px 20px 28px; background:var(--ink); border-top:1px solid rgba(180,134,11,.2); text-align:center; flex-shrink:0; }
.sum-foot .btn-title { margin:0 auto; display:block; }


.people-rel-label {
  font-family: 'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--brown);
  white-space: nowrap;
  flex-shrink: 0;
  width: 68px;
  text-align: right;
}

/* ── PEOPLE TAB: relationship bar in rows ── */
.people-rel-bar {
  height: 3px;
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
  background: rgba(255,255,255,.08);
}
.people-rel-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .4s;
}

/* ── PEOPLE TAB ── */
.act-name {
  font-family: 'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps;
  font-size: 14px;
  letter-spacing: 0.5px;
  color: var(--ink);
  display: block;
  font-weight: 400;
}
.act-relation {
  font-size: 10px;
  color: var(--sepia);
  font-style: italic;
  letter-spacing: 0.5px;
  display: block;
  margin-top: 1px;
  font-family: 'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps;
}
/* People rows wrap so the rel-bar sits below the main row */
.people-row {
  display: block !important;
  padding: 10px 14px 8px !important;
}
.people-row-inner {
  display: flex;
  align-items: center;
  gap: 11px;
  width: 100%;
}
.people-rel-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0 2px 39px;
}
.people-rel-track {
  flex: 1;
  height: 4px;
  background: rgba(0,0,0,.1);
  border-radius: 2px;
  overflow: hidden;
}
.people-rel-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .4s ease;
}
.people-rel-label {
  font-family: 'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--brown);
  white-space: nowrap;
  width: 68px;
  text-align: right;
  flex-shrink: 0;
}
/* People section headers */
.people-section-label {
  background: var(--ink);
  color: var(--gold);
  font-family: 'Palatino Linotype','Book Antiqua',Palatino,'Noto Serif',Georgia,serif;font-variant:small-caps;
  font-size: 10px;
  letter-spacing: 3px;

<script>
  // ── INIT — runs after ALL scripts have loaded ──────────
  // Wrapped in DOMContentLoaded so every function exists before we call anything

  function continueGame() {
    // Continue loads the autosave (slot 0) directly
    var btn = document.getElementById('btn-continue');
    if (btn) btn.textContent = 'Loading…';
    loadFromSlot(0).then(function(ok) {
      if (ok) {
        showScreen('s-game');
        currentView = 'home';
        buildNav();
        renderStats();
        addFeedEntry('Welcome back, ' + G.name + '.', 'event');
      } else {
        // No autosave — fall back to slot picker
        openSaveSlots('load');
      }
    }).catch(function() { openSaveSlots('load'); });
  }

  function openSaveSlots(mode) {
    var modal = document.getElementById('save-modal');
    var title = document.getElementById('save-modal-title');
    if (!modal) return;
    title.textContent = mode === 'save' ? 'Save Your Life' : 'Saved Lives';
    modal.classList.add('open');
    renderSaveSlots(mode);
  }

  function closeSaveModal() {
    var modal = document.getElementById('save-modal');
    if (modal) modal.classList.remove('open');
  }

  function renderSaveSlots(mode) {
    var list = document.getElementById('save-slots-list');
    if (!list) return;
    list.innerHTML = '<div style="padding:14px 18px;color:var(--sepia);font-size:13px">Loading saves…</div>';

    getAllSlotsMeta().then(function(slots) {
      var html = '';
      for (var i = 0; i < slots.length; i++) {
        var s = slots[i];
        var isAuto = s.slot === 0;
        var slotLabel = isAuto ? '* Autosave' : 'Slot ' + s.slot;

        if (s.empty) {
          if (isAuto) {
            // Autosave slot always shown, even if empty
            html += '<div class="save-slot empty">'
              + '<div class="save-slot-info">'
              + '<span class="save-slot-name">' + slotLabel + '</span>'
              + '<span class="save-slot-meta">No autosave yet — play a season to create one</span>'
              + '</div></div>';
          } else if (mode === 'save') {
            html += '<div class="save-slot empty" onclick="doSaveToSlot(' + s.slot + ')">'
              + '<div class="save-slot-info">'
              + '<span class="save-slot-name">' + slotLabel + ' — Empty</span>'
              + '<span class="save-slot-meta">Tap to save here</span>'
              + '</div></div>';
          } else {
            html += '<div class="save-slot empty">'
              + '<div class="save-slot-info">'
              + '<span class="save-slot-name">' + slotLabel + ' — Empty</span>'
              + '</div></div>';
          }
        } else {
          var actionAttr = mode === 'save' && !isAuto
            ? 'onclick="doSaveToSlot(' + s.slot + ')"'
            : 'onclick="doLoadSlot(' + s.slot + ')"';
          var nameDisplay = isAuto ? (s.name || '?') : (s.label || s.name);
          html += '<div class="save-slot" ' + actionAttr + '>'
            + '<div class="save-slot-info">'
            + '<span class="save-slot-name">'
              + (isAuto ? '<em style="color:var(--gold)">* Autosave</em> — ' : '')
              + nameDisplay + '</span>'
            + '<span class="save-slot-meta">'
              + (s.name || '?') + ' · Age ' + (s.age || '?')
              + ' · ' + (s.season || '') + ' · ' + (s.saved || '') + '</span>'
            + '</div>'
            + (!isAuto && mode === 'load'
              ? '<button class="save-slot-del" onclick="event.stopPropagation();doDeleteSlot(' + s.slot + ')">✕</button>'
              : '')
            + '</div>';
        }
      }
      list.innerHTML = html;
    }).catch(function() {
      list.innerHTML = '<div style="padding:14px 18px;color:var(--sepia)">Could not load saves.</div>';
    });
  }

  function doSaveToSlot(slot) {
    if (typeof saveToSlot === 'function') {
      var label = G && G.name ? G.name + ' — Age ' + G.age : 'Save ' + (slot + 1);
      saveToSlot(slot, label);
      closeSaveModal();
      if (typeof addFeedEntry === 'function') addFeedEntry('Game saved.', 'event');
    }
  }

  function doLoadSlot(slot) {
    loadFromSlot(slot).then(function(ok) {
      closeSaveModal();
      if (ok) {
        showScreen('s-game');
        currentView = 'home';
        buildNav();
        renderStats();
        addFeedEntry('Welcome back, ' + G.name + '.', 'event');
      } else {
        alert('Could not load that save.');
      }
    });
  }

  function doDeleteSlot(slot) {
    if (confirm('Delete this save? This cannot be undone.')) {
      deleteSlot(slot);
      renderSaveSlots('load');
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    try {
      // Register service worker for PWA/offline support
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function() {});
      }

      // Build the rank selection grid
      if (typeof buildRankGrid === 'function') {
        buildRankGrid();
      }

      // Check slot 0 (autosave) — show Continue if it exists
      if (typeof getAllSlotsMeta === 'function') {
        getAllSlotsMeta().then(function(slots) {
          var autosave = slots[0];
          var anyManual = slots.slice(1).some(function(s){ return !s.empty; });
          if (autosave && !autosave.empty) {
            var btnC = document.getElementById('btn-continue');
            if (btnC) { btnC.style.display = 'block'; btnC.textContent = 'Continue — ' + (autosave.name||'Your Story'); }
          }
          if (anyManual) {
            var btnS = document.getElementById('btn-saves');
            if (btnS) btnS.style.display = 'block';
          }
        }).catch(function(){});
      }
    } catch(e) {
      console.error('Init error:', e);
    }
  });
</script>
